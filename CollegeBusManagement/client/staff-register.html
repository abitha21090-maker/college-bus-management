<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Staff Registration — College Bus Management</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-split">
  <div class="auth-side">
    <span class="route-tile" style="margin-bottom:20px;">T</span>
    <h2>For faculty &amp; staff riders.</h2>
    <p>Register with your staff ID and department. You'll be able to book a route and track your bus, just like students do.</p>
  </div>
  <div class="auth-form-wrap">
    <div class="auth-card">
      <h1>Create your staff account</h1>
      <p class="subtitle">A few details to get you set up.</p>
      <div id="form-message" class="form-message"></div>
      <form id="register-form" data-role="staff">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" required autocomplete="name" />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="staffId">Staff ID</label>
            <input type="text" id="staffId" name="staffId" required placeholder="e.g. STF-1042" />
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="department">Department</label>
            <input type="text" id="department" name="department" placeholder="e.g. Mathematics" />
          </div>
          <div class="field">
            <label for="designation">Designation</label>
            <input type="text" id="designation" name="designation" placeholder="e.g. Assistant Professor" />
          </div>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" />
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" />
          </div>
        </div>
        <button type="submit" class="btn-primary">Create account</button>
      </form>
      <p class="form-footer">Already registered? <a href="staff-login.html">Sign in</a></p>
      <p class="form-footer"><a href="index.html">&larr; Back to home</a></p>
    </div>
  </div>
</div>

<script src="css/js/main.js"></script>
<script src="css/js/register.js"></script>
</body>
</html>
