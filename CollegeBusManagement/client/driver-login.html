<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Driver Sign In — College Bus Management</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-split">
  <div class="auth-side">
    <span class="route-tile" style="margin-bottom:20px;">D</span>
    <h2>Keep your riders in the know.</h2>
    <p>Sign in to see your assigned bus and route, and share your live location so students can track you.</p>
  </div>
  <div class="auth-form-wrap">
    <div class="auth-card">
      <h1>Driver sign in</h1>
      <p class="subtitle">Enter your email and password.</p>
      <div id="form-message" class="form-message"></div>
      <form id="login-form" data-role="driver">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary">Sign in</button>
      </form>
      <p class="form-footer">New driver? <a href="driver-register.html">Create an account</a></p>
      <p class="form-footer"><a href="index.html">&larr; Back to home</a></p>
    </div>
  </div>
</div>

<script src="css/js/main.js"></script>
<script src="css/js/login.js"></script>
</body>
</html>
